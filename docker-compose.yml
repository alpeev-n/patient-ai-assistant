services:

  app:
    build: ./app
    env_file:
      - .env
    depends_on:
      database:
        condition: service_healthy
    restart: on-failure
    volumes:
    - .:/project

  web-proxy:
    build: ./web-proxy
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"

  database:
    image: postgres:16
    env_file:
      - .env
    restart: on-failure
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:                                                                                                                                                              
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 15s
      retries: 3

  rabbitmq:
    image: rabbitmq:management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./rabbitmq_data:/var/lib/rabbitmq
    restart: on-failure
    env_file:
      - .env
