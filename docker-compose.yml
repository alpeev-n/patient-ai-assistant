services:

  app:
    build: .
    env_file:
      - .env
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  web-proxy:
    build: ./web-proxy
    depends_on:
      - app
    restart: on-failure
    ports:
      - "80:80"
      - "443:443"

  database:
    image: postgres:16
    env_file:
      - .env
    restart: on-failure
    volumes:
      - postgres_volume:/var/lib/postgresql/data
    healthcheck:                                                                                                                                                              
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 15s
      retries: 3

  rabbitmq:
    image: rabbitmq:management
    env_file:
      - .env
    restart: on-failure
    volumes:
      - rabbitmq_volume:/var/lib/rabbitmq
    healthcheck:                                                                                                                                                              
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 15s
      retries: 3
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_volume:
  rabbitmq_volume:
